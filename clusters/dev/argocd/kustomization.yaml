apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ArgoCD control plane — pinned two ways:
#   Version : v3.4.4  (git tag on the upstream install manifest below)
#   Image   : quay.io/argoproj/argocd pinned by digest via the images transformer
#
# We consume the upstream non-HA install manifest unmodified and only pin it —
# no fork, no Helm (CLAUDE.md: third-party manifests pinned by version/digest).
# To upgrade: bump the tag in the resource URL AND the digest below together.
# The digest must be the multi-arch INDEX digest (not a per-arch child), so
# nodes on any architecture resolve correctly. Resolve it with:
#   docker buildx imagetools inspect quay.io/argoproj/argocd:<newtag> --format '{{.Manifest.Digest}}'
namespace: argocd

resources:
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.4/manifests/install.yaml

images:
  - name: quay.io/argoproj/argocd
    digest: sha256:2fb3efa9eaa42382acb39c9a1485eaac7a1ad7a09e8aa7da7143ca256fa6da09

# The cost-constrained cluster (ADR-0002) taints the system node
# (CriticalAddonsOnly) and the user pool (spot). ArgoCD's upstream manifests
# carry no tolerations, so its control plane can't schedule on either pool.
# Add both tolerations so it lands on the system node (stable) and can spill to
# spot. Without this, a freshly-bootstrapped cluster leaves ArgoCD Pending.
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: CriticalAddonsOnly
            operator: Exists
            effect: NoSchedule
          - key: kubernetes.azure.com/scalesetpriority
            operator: Equal
            value: spot
            effect: NoSchedule
  - target:
      kind: StatefulSet
    patch: |-
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: CriticalAddonsOnly
            operator: Exists
            effect: NoSchedule
          - key: kubernetes.azure.com/scalesetpriority
            operator: Equal
            value: spot
            effect: NoSchedule

