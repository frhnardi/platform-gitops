apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - grafana.yaml
  - prometheus.yaml
  - ingress.yaml
configMapGenerator:
  - name: grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/platform-engineering.json
      - dashboards/developer-overview.json
