apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - grafana.yaml
  - prometheus.yaml
  - loki.yaml
  - deepseek-webhook.yaml
  - ingress.yaml
configMapGenerator:
  - name: grafana-dashboards
    namespace: monitoring
    files:
      - dashboards/dashboards.yaml
      - dashboards/platform-narrative.json
      - dashboards/platform-engineering.json
      - dashboards/developer-overview.json
      - dashboards/security.json
      - dashboards/security-posture.json
      - dashboards/cost-efficiency.json
generatorOptions:
  disableNameSuffixHash: true
