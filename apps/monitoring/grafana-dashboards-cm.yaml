    {"title": "\ud83d\udee1\ufe0f Security & Compliance Posture", "uid": "security-posture", "tags": ["security", "compliance", "narrative"], "refresh": "30s", "editable": true, "graphTooltip": 1, "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m"]}, "time": {"from": "now-6h", "to": "now"}, "panels": [{"id": 1, "type": "row", "title": "\ud83c\udfaf Security Posture at a Glance", "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}, "collapsed": false}, {"id": 100, "type": "gauge", "title": "\ud83d\udee1\ufe0f Security Posture Score", "description": "Composite score from: NetworkPolicy coverage (30%), pod health (25%), RBAC hardening (25%), secret density risk (20%). No external admission controller required \u2014 works with built-in kube-state-metrics. Kyverno metrics will auto-merge if available.", "gridPos": {"x": 0, "y": 1, "w": 6, "h": 8}, "targets": [{"expr": "clamp_max(100 * ((count(kube_networkpolicy_created) / (count(kube_networkpolicy_created) + 3)) * 0.30 + (1 - (count(kube_pod_status_phase{phase!=\"Running\"}) / (count(kube_pod_info) + 1))) * 0.25 + (1 - (count(kube_secret_info) / (count(kube_pod_info) + 1)) * 0.05) * 0.25 + (count(kube_service_account_info) / (count(kube_pod_info) + 1)) * 0.20), 100)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "dark-red", "value": null}, {"color": "red", "value": 30}, {"color": "orange", "value": 55}, {"color": "yellow", "value": 75}, {"color": "green", "value": 90}]}}}}, {"id": 101, "type": "stat", "title": "\ud83c\udf10 Network Policy Coverage", "description": "Namespaces with at least one NetworkPolicy. Empty clusters score low \u2014 deploy NetworkPolicies to improve.", "gridPos": {"x": 6, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(count by (namespace) (kube_networkpolicy_created))", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "value_and_name"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 5}]}}}}, {"id": 102, "type": "stat", "title": "\ud83d\udd10 RBAC: ServiceAccounts", "description": "Total ServiceAccounts across cluster. High count = fine-grained workload identity; zero = everything runs as default (risk).", "gridPos": {"x": 9, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(kube_service_account_info)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 5}, {"color": "green", "value": 20}]}}}}, {"id": 103, "type": "stat", "title": "\ud83d\udcdc RBAC: Roles", "description": "ClusterRoles + Roles in the cluster. Indicates RBAC maturity \u2014 more roles = more granular access control.", "gridPos": {"x": 12, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(kube_role_info) + count(kube_clusterrole_info)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}, {"color": "green", "value": 10}]}}}}, {"id": 104, "type": "stat", "title": "\ud83d\udd11 Secrets Count", "description": "Total Kubernetes Secrets. High count in system namespaces is normal; watch for spikes in app namespaces (secret sprawl).", "gridPos": {"x": 15, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(kube_secret_info)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 100}, {"color": "red", "value": 300}]}}}}, {"id": 105, "type": "stat", "title": "\ud83d\udce6 Network Policies", "description": "Total NetworkPolicy objects. Every namespace should have at least a deny-all default policy.", "gridPos": {"x": 18, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(kube_networkpolicy_created)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 10}]}}}}, {"id": 106, "type": "stat", "title": "\u26a0\ufe0f Non-Running Pods", "description": "Pods in CrashLoopBackOff, Error, ImagePullBackOff, Pending, etc. These are security-relevant \u2014 they may indicate misconfiguration or supply-chain issues.", "gridPos": {"x": 21, "y": 1, "w": 3, "h": 4}, "targets": [{"expr": "count(kube_pod_status_phase{phase!=\"Running\"})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}}}}, {"id": 110, "type": "stat", "title": "\ud83d\udc80 Failed Pods", "description": "Pods in Failed phase. Investigate immediately \u2014 may indicate crash loops, OOM, or security policy rejections.", "gridPos": {"x": 6, "y": 5, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Failed\"})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}}}}, {"id": 111, "type": "stat", "title": "\ud83e\uddf9 Pending Pods", "description": "Pods stuck in Pending. Often a resource quota or scheduling issue \u2014 can indicate DoS risk if systemic.", "gridPos": {"x": 9, "y": 5, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Pending\"})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}}, {"id": 112, "type": "stat", "title": "\ud83d\udd04 Restarts (1h)", "description": "Container restarts in the last hour. Spikes may indicate crashes from security patches, OOM from resource limits, or runtime attacks.", "gridPos": {"x": 12, "y": 5, "w": 3, "h": 3}, "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 3}, {"color": "red", "value": 10}]}}}}, {"id": 113, "type": "stat", "title": "\ud83d\udea8 Privileged Pods", "description": "Pods running with privileged:true or hostNetwork/hostPID. Each one expands the cluster attack surface \u2014 aim for zero in production namespaces.", "gridPos": {"x": 15, "y": 5, "w": 3, "h": 3}, "targets": [{"expr": "sum(kube_pod_container_info{container=~\".+\"} * on(pod, namespace) group_left kube_pod_security_context{type=\"privileged\", pod!=\"\"}) OR on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}}}, {"id": 114, "type": "stat", "title": "\ud83d\udce6 Unused ConfigMaps", "description": "Stale ConfigMaps may contain leaked configs or stale credentials. Regular cleanup reduces data exposure surface.", "gridPos": {"x": 18, "y": 5, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_configmap_info) - count(kube_configmap_info{} * on(namespace, configmap) group_left kube_pod_configmap_info{})", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 20}, {"color": "red", "value": 50}]}}}}, {"id": 200, "type": "row", "title": "\ud83d\udee1\ufe0f Attack Surface & Isolation", "gridPos": {"x": 0, "y": 9, "w": 24, "h": 1}, "collapsed": false}, {"id": 201, "type": "bargauge", "title": "\ud83d\udcca Pods by Namespace (Size = Attack Surface)", "description": "Larger namespaces have larger blast radius. Use this to prioritize network policy and RBAC hardening.", "gridPos": {"x": 0, "y": 10, "w": 8, "h": 8}, "targets": [{"expr": "count by (namespace) (kube_pod_info)", "legendFormat": "{{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}}}}, {"id": 202, "type": "bargauge", "title": "\ud83d\udd11 Secrets per Namespace", "description": "Secret density by namespace. System namespaces (kube-system, cert-manager) are expected; high counts in app namespaces warrant review.", "gridPos": {"x": 8, "y": 10, "w": 8, "h": 8}, "targets": [{"expr": "count by (namespace) (kube_secret_info)", "legendFormat": "{{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}}}}, {"id": 203, "type": "bargauge", "title": "\ud83c\udf10 Network Policy Coverage per Namespace", "description": "Namespaces WITH network policies. Empty namespaces have zero isolation \u2014 every pod can talk to every other pod, every namespace.", "gridPos": {"x": 16, "y": 10, "w": 8, "h": 8}, "targets": [{"expr": "count by (namespace) (kube_networkpolicy_created)", "legendFormat": "{{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}}, {"id": 300, "type": "row", "title": "\ud83d\udcc8 Security Trends Over Time", "gridPos": {"x": 0, "y": 19, "w": 24, "h": 1}, "collapsed": false}, {"id": 301, "type": "timeseries", "title": "\ud83d\udd04 Pod Restarts \u2014 Crash/Attack Early Warning", "description": "Rate of container restarts by namespace. Sudden spikes may indicate: security patches triggering crashes, OOM kills from exploited services, or failed deployments.", "gridPos": {"x": 0, "y": 20, "w": 12, "h": 6}, "targets": [{"expr": "sum by (namespace) (rate(kube_pod_container_status_restarts_total[5m]))", "legendFormat": "{{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"fillOpacity": 15, "lineWidth": 2}}}}, {"id": 302, "type": "timeseries", "title": "\ud83d\udcca Pod Status by Phase", "description": "Stacked view of pod phases over time. A growing 'Failed' or 'Pending' band indicates escalating issues.", "gridPos": {"x": 12, "y": 20, "w": 12, "h": 6}, "targets": [{"expr": "count by (phase) (kube_pod_status_phase)", "legendFormat": "{{phase}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 20, "stacking": {"mode": "normal"}, "lineWidth": 1}}}}, {"id": 303, "type": "timeseries", "title": "\ud83d\udd10 RBAC Changes Over Time", "description": "Rate of Role/ClusterRole/RoleBinding changes. Spikes may indicate: IAM automation running, privilege escalation attempts, or misconfiguration storms.", "gridPos": {"x": 0, "y": 26, "w": 12, "h": 6}, "targets": [{"expr": "sum(rate(kube_role_created[5m])) + sum(rate(kube_clusterrole_created[5m]))", "legendFormat": "Roles Created", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}, {"expr": "sum(rate(kube_rolebinding_created[5m])) + sum(rate(kube_clusterrolebinding_created[5m]))", "legendFormat": "Bindings Created", "refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 304, "type": "timeseries", "title": "\ud83c\udf10 Network Policy Adoption", "description": "Growth of NetworkPolicy objects over time. Flat line = no one is adding isolation. Upward trend = security posture improving.", "gridPos": {"x": 12, "y": 26, "w": 12, "h": 6}, "targets": [{"expr": "count by (namespace) (kube_networkpolicy_created)", "legendFormat": "{{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 15, "lineWidth": 2}}}}, {"id": 400, "type": "row", "title": "\ud83d\udcdc Detailed Audit Tables", "gridPos": {"x": 0, "y": 33, "w": 24, "h": 1}, "collapsed": false}, {"id": 401, "type": "table", "title": "\ud83d\udcdc RBAC: ClusterRoles & Roles", "description": "Full list of Roles and ClusterRoles. Look for overly permissive rules: verbs=[\"*\"] + resources=[\"*\"] = red flag.", "gridPos": {"x": 0, "y": 34, "w": 12, "h": 7}, "targets": [{"expr": "label_join(kube_role_info, \"role_name\", \"-\", \"role\", \"namespace\")", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]}, {"id": 402, "type": "table", "title": "\u26a0\ufe0f Non-Running Pods \u2014 Investigate These!", "description": "Every pod not in Running phase. Includes namespace, pod name, and phase. Prioritize Failed and Unknown pods \u2014 they may indicate security events.", "gridPos": {"x": 12, "y": 34, "w": 12, "h": 7}, "targets": [{"expr": "kube_pod_status_phase{phase!=\"Running\"}", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]}, {"id": 403, "type": "table", "title": "\ud83d\udd0d Pods Running as Default ServiceAccount", "description": "Pods using the 'default' ServiceAccount in their namespace. Each one runs with namespace-default permissions \u2014 use dedicated SAs with scoped RBAC instead.", "gridPos": {"x": 0, "y": 41, "w": 12, "h": 7}, "targets": [{"expr": "kube_pod_info{} * on(namespace, pod) group_left(service_account) kube_pod_service_account{service_account=\"default\"}", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]}]}
