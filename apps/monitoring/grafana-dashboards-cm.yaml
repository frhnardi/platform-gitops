apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cost-efficiency.json: |
    {"title": "\ud83d\udcb0 Cost & Efficiency", "uid": "cost-efficiency", "tags": ["cost", "finops", "efficiency", "narrative"], "refresh": "1m", "editable": true, "graphTooltip": 1, "timepicker": {"refresh_intervals": ["30s", "1m", "5m", "15m", "30m"]}, "time": {"from": "now-24h", "to": "now"}, "panels": [{"id": 1, "type": "row", "title": "\ud83d\udcb8 Cost at a Glance", "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}, "collapsed": false}, {"id": 100, "type": "stat", "title": "\ud83d\udda5\ufe0f Total Nodes", "gridPos": {"x": 0, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_node_info)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 101, "type": "stat", "title": "\ud83d\udc8e Regular Nodes", "gridPos": {"x": 3, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_node_info{label_topology_kubernetes_io_region!=\"\",label_kubernetes_azure_com_agentpool!~\"spot.*\"})", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "purple"}}}}, {"id": 102, "type": "stat", "title": "\u26a1 Spot Nodes", "gridPos": {"x": 6, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_node_info{label_kubernetes_azure_com_agentpool=~\"spot.*\"})", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}}, {"id": 103, "type": "stat", "title": "\ud83d\udce6 Total Pods", "gridPos": {"x": 9, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_pod_info)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 104, "type": "stat", "title": "\ud83d\udcbe Total CPU (cores)", "gridPos": {"x": 12, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "sum(kube_node_status_allocatable{resource=\"cpu\"})", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "cores", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 105, "type": "stat", "title": "\ud83e\udde0 Total Memory (GB)", "gridPos": {"x": 15, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "sum(kube_node_status_allocatable{resource=\"memory\"}) / 1073741824", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "decgbytes", "decimals": 1, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 106, "type": "stat", "title": "\ud83d\udcbf Storage (GB)", "gridPos": {"x": 18, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "sum(kube_node_status_allocatable{resource=\"ephemeral_storage\"}) / 1073741824", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "decgbytes", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 107, "type": "stat", "title": "\ud83d\udcca Apps Deployed", "gridPos": {"x": 21, "y": 1, "w": 3, "h": 3}, "targets": [{"expr": "count(kube_deployment_created)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}}}}, {"id": 200, "type": "row", "title": "\ud83d\udcca Resource Utilization \u2014 Are We Wasting Money?", "gridPos": {"x": 0, "y": 5, "w": 24, "h": 1}, "collapsed": false}, {"id": 201, "type": "gauge", "title": "\ud83d\udcbb CPU Utilization (Cluster)", "gridPos": {"x": 0, "y": 6, "w": 6, "h": 6}, "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m])) / scalar(sum(kube_node_status_allocatable{resource=\"cpu\"})) * 100", "refId": "A"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}, {"color": "green", "value": 40}, {"color": "yellow", "value": 60}, {"color": "orange", "value": 75}, {"color": "red", "value": 90}]}}}}, {"id": 202, "type": "gauge", "title": "\ud83e\udde0 Memory Utilization (Cluster)", "gridPos": {"x": 6, "y": 6, "w": 6, "h": 6}, "targets": [{"expr": "sum(container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) / scalar(sum(kube_node_status_allocatable{resource=\"memory\"})) * 100", "refId": "A"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}, {"color": "green", "value": 40}, {"color": "yellow", "value": 60}, {"color": "orange", "value": 80}, {"color": "red", "value": 95}]}}}}, {"id": 203, "type": "gauge", "title": "\ud83d\udfe2 Spot Coverage", "gridPos": {"x": 12, "y": 6, "w": 6, "h": 6}, "targets": [{"expr": "count(kube_pod_info * on(node) group_left(label_kubernetes_azure_com_agentpool) kube_node_labels{label_kubernetes_azure_com_agentpool=~\"spot.*\"}) / scalar(count(kube_pod_info)) * 100", "refId": "A"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 20}, {"color": "yellow", "value": 50}, {"color": "green", "value": 80}]}}}}, {"id": 204, "type": "gauge", "title": "\u26a1 Spot Savings Opportunity", "gridPos": {"x": 18, "y": 6, "w": 6, "h": 6}, "targets": [{"expr": "100 - (count(kube_pod_info * on(node) group_left(label_kubernetes_azure_com_agentpool) kube_node_labels{label_kubernetes_azure_com_agentpool=~\"spot.*\"}) / scalar(count(kube_pod_info)) * 100)", "refId": "A"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 20}, {"color": "orange", "value": 50}, {"color": "red", "value": 80}]}}}}, {"id": 300, "type": "row", "title": "\ud83d\udcc8 Resource Trends (24h)", "gridPos": {"x": 0, "y": 13, "w": 24, "h": 1}, "collapsed": false}, {"id": 301, "type": "timeseries", "title": "\ud83d\udcbb CPU Usage per Node (%) \u2014 Which Node is Hot?", "gridPos": {"x": 0, "y": 14, "w": 8, "h": 7}, "targets": [{"expr": "sum by (kubernetes_io_hostname) (rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m])) / scalar(sum by (kubernetes_io_hostname) (kube_node_status_allocatable{resource=\"cpu\"})) * 100", "legendFormat": "{{kubernetes_io_hostname}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"fillOpacity": 15, "lineWidth": 2}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 60}, {"color": "red", "value": 85}]}}}}, {"id": 302, "type": "timeseries", "title": "\ud83e\udde0 Memory per Node (%)", "gridPos": {"x": 8, "y": 14, "w": 8, "h": 7}, "targets": [{"expr": "sum by (kubernetes_io_hostname) (container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) / scalar(sum by (kubernetes_io_hostname) (kube_node_status_allocatable{resource=\"memory\"})) * 100", "legendFormat": "{{kubernetes_io_hostname}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"fillOpacity": 15, "lineWidth": 2}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 70}, {"color": "red", "value": 90}]}}}}, {"id": 303, "type": "timeseries", "title": "\ud83d\udce1 Network Traffic (MB/s)", "gridPos": {"x": 16, "y": 14, "w": 8, "h": 7}, "targets": [{"expr": "sum(rate(container_network_receive_bytes_total[5m])) / 1048576", "legendFormat": "RX Inbound", "refId": "A"}, {"expr": "-sum(rate(container_network_transmit_bytes_total[5m])) / 1048576", "legendFormat": "TX Outbound", "refId": "B"}], "fieldConfig": {"defaults": {"unit": "Mbytes", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 400, "type": "row", "title": "\ud83d\uddc2\ufe0f Workload Distribution & Optimization", "gridPos": {"x": 0, "y": 22, "w": 24, "h": 1}, "collapsed": false}, {"id": 401, "type": "bargauge", "title": "\ud83d\udce6 Pods per Node (Load Distribution)", "gridPos": {"x": 0, "y": 23, "w": 8, "h": 7}, "targets": [{"expr": "count by (node) (kube_pod_info)", "legendFormat": "{{node}}", "refId": "A"}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}}, {"id": 402, "type": "bargauge", "title": "\ud83d\udcbb CPU per Namespace (cores)", "gridPos": {"x": 8, "y": 23, "w": 8, "h": 7}, "targets": [{"expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m]))", "legendFormat": "{{namespace}}", "refId": "A"}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"unit": "cores", "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}}, {"id": 403, "type": "bargauge", "title": "\ud83e\udde0 Memory per Namespace (MB)", "gridPos": {"x": 16, "y": 23, "w": 8, "h": 7}, "targets": [{"expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) / 1048576", "legendFormat": "{{namespace}}", "refId": "A"}], "options": {"orientation": "horizontal"}, "fieldConfig": {"defaults": {"unit": "Mbytes", "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}}}}, {"id": 500, "type": "row", "title": "\ud83d\udd04 Long-Term Cost Trends (30d)", "gridPos": {"x": 0, "y": 31, "w": 24, "h": 1}, "collapsed": false}, {"id": 501, "type": "timeseries", "title": "\ud83d\udcc8 CPU Usage Trend \u2014 Right-Sizing Candidates?", "gridPos": {"x": 0, "y": 32, "w": 12, "h": 7}, "targets": [{"expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[1h])) / scalar(sum(kube_node_status_allocatable{resource=\"cpu\"})) * 100", "legendFormat": "Cluster CPU %", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"fillOpacity": 15, "lineWidth": 2}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 60}, {"color": "red", "value": 85}]}}}}, {"id": 502, "type": "timeseries", "title": "\ud83e\udde0 Memory Trend \u2014 Growing or Stable?", "gridPos": {"x": 12, "y": 32, "w": 12, "h": 7}, "targets": [{"expr": "sum(container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) / scalar(sum(kube_node_status_allocatable{resource=\"memory\"})) * 100", "legendFormat": "Cluster Memory %", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percent", "custom": {"fillOpacity": 15, "lineWidth": 2}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 70}, {"color": "red", "value": 90}]}}}}, {"id": 600, "type": "row", "title": "\ud83d\udca1 Optimization Recommendations (Right-Sizing)", "gridPos": {"x": 0, "y": 40, "w": 24, "h": 1}, "collapsed": false}, {"id": 601, "type": "table", "title": "\ud83d\udfe2 Low-Utilization Pods \u2014 Can We Reduce Requests?", "gridPos": {"x": 0, "y": 41, "w": 12, "h": 7}, "targets": [{"expr": "avg by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[1h])) < 0.01", "format": "table", "instant": true, "refId": "A"}], "transformations": [{"id": "organize", "options": {"renameByName": {"namespace": "Namespace", "pod": "Pod", "Value": "Avg CPU (cores)"}, "excludeByName": {"Time": true}}}]}, {"id": 602, "type": "table", "title": "\ud83d\udd34 Top CPU Consumers \u2014 Optimization Priority", "gridPos": {"x": 12, "y": 41, "w": 12, "h": 7}, "targets": [{"expr": "topk(10, sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m])))", "format": "table", "instant": true, "refId": "A"}], "transformations": [{"id": "organize", "options": {"renameByName": {"namespace": "Namespace", "pod": "Pod", "Value": "CPU (cores)"}, "excludeByName": {"Time": true}}}]}]}
  developer-overview.json: |
    {"title": "Developer Overview", "uid": "developer-overview", "tags": ["apps", "developers"], "refresh": "30s", "editable": true, "graphTooltip": 1, "panels": [{"id": 1, "type": "stat", "title": "Deployments Ready", "gridPos": {"x": 0, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "sum(kube_deployment_status_replicas_available)", "legendFormat": "Ready", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 3}]}, "unit": "short", "decimals": 0}}}, {"id": 2, "type": "stat", "title": "Running Pods", "gridPos": {"x": 4, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Running\"})", "legendFormat": "Running", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 5}, {"color": "green", "value": 10}]}, "unit": "short", "decimals": 0}}}, {"id": 3, "type": "stat", "title": "Failed Pods", "gridPos": {"x": 8, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=~\"Failed|Unknown\"})", "legendFormat": "Failed", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}, "unit": "short", "decimals": 0}}}, {"id": 4, "type": "stat", "title": "CPU Cores (Cluster)", "gridPos": {"x": 12, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "sum(machine_cpu_cores)", "legendFormat": "Cores", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 5, "type": "stat", "title": "Namespaces", "gridPos": {"x": 16, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_namespace_created)", "legendFormat": "NS", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 6, "type": "stat", "title": "Services", "gridPos": {"x": 20, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_service_info)", "legendFormat": "Svcs", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 10, "type": "table", "title": "Deployment Health", "gridPos": {"x": 0, "y": 3, "w": 12, "h": 7}, "targets": [{"expr": "kube_deployment_status_replicas_available / kube_deployment_spec_replicas", "legendFormat": "{{namespace}}/{{deployment}}", "format": "table", "instant": true, "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.5}, {"color": "green", "value": 1}]}, "unit": "percentunit", "custom": {"minWidth": 120, "cellOptions": {"type": "color-background"}}}}}, {"id": 11, "type": "piechart", "title": "Pod Status Breakdown", "gridPos": {"x": 12, "y": 3, "w": 6, "h": 7}, "targets": [{"expr": "count by (phase) (kube_pod_status_phase{phase=~\"Running|Pending|Failed|Succeeded|Unknown\"})", "legendFormat": "{{phase}}", "refId": "A"}]}, {"id": 12, "type": "bargauge", "title": "Pods per Namespace", "gridPos": {"x": 18, "y": 3, "w": 6, "h": 7}, "targets": [{"expr": "count by (namespace) (kube_pod_info)", "legendFormat": "{{namespace}}", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}}}, {"id": 20, "type": "stat", "title": "Container Restarts (1h)", "gridPos": {"x": 0, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))", "legendFormat": "Restarts", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}, "unit": "short", "decimals": 0}}}, {"id": 21, "type": "stat", "title": "CrashLoopBackOff", "gridPos": {"x": 4, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_container_status_waiting_reason{reason=\"CrashLoopBackOff\"})", "legendFormat": "CrashLoop", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short", "decimals": 0}}}, {"id": 22, "type": "stat", "title": "Pending Pods", "gridPos": {"x": 8, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Pending\"})", "legendFormat": "Pending", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}, "unit": "short", "decimals": 0}}}, {"id": 23, "type": "stat", "title": "ImagePullBackOff", "gridPos": {"x": 12, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_container_status_waiting_reason{reason=\"ImagePullBackOff\"})", "legendFormat": "PullErr", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short", "decimals": 0}}}, {"id": 24, "type": "stat", "title": "OOMKilled (1h)", "gridPos": {"x": 16, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "sum(increase(kube_pod_container_status_terminated_reason{reason=\"OOMKilled\"}[1h]))", "legendFormat": "OOM", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short", "decimals": 0}}}, {"id": 25, "type": "stat", "title": "Available Nodes", "gridPos": {"x": 20, "y": 10, "w": 4, "h": 3}, "targets": [{"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "legendFormat": "Ready", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}, "unit": "short", "decimals": 0}}}, {"id": 30, "type": "timeseries", "title": "CPU per Pod (top 10)", "gridPos": {"x": 0, "y": 13, "w": 12, "h": 7}, "targets": [{"expr": "topk(10, sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{container!=\"\",pod!=\"\"}[5m])))", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "cores", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 31, "type": "timeseries", "title": "Memory per Pod (top 10, MB)", "gridPos": {"x": 12, "y": 13, "w": 12, "h": 7}, "targets": [{"expr": "topk(10, sum by (pod, namespace) (container_memory_working_set_bytes{container!=\"\",pod!=\"\"}) / 1048576)", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "Mbytes", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 40, "type": "timeseries", "title": "Container Restarts Trend (10min)", "gridPos": {"x": 0, "y": 20, "w": 24, "h": 6}, "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total[10m])) by (namespace, pod)", "legendFormat": "{{namespace}}/{{pod}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "normal"}}}}}], "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m"]}, "time": {"from": "now-6h", "to": "now"}}
