    {"title": "Platform Engineering", "uid": "platform-engineering", "tags": ["platform", "infra", "ops"], "refresh": "30s", "editable": true, "graphTooltip": 1, "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m"]}, "time": {"from": "now-1h", "to": "now"}, "panels": [{"id": 1, "type": "gauge", "title": "Platform Health Score", "gridPos": {"x": 0, "y": 0, "w": 6, "h": 6}, "targets": [{"expr": "clamp_max(100 * (sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info) * 0.3 + count(kube_pod_status_phase{phase=\"Running\"}) / count(kube_pod_info) * 0.3 + sum(kube_deployment_status_condition{condition=\"Available\",status=\"true\"}) / count(kube_deployment_created) * 0.4), 100)", "refId": "A"}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showThresholdLabels": true, "showThresholdMarkers": true}, "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 70}, {"color": "green", "value": 90}]}}}}, {"id": 2, "type": "stat", "title": "Nodes", "gridPos": {"x": 6, "y": 0, "w": 2, "h": 2}, "targets": [{"expr": "count(kube_node_info)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}}, {"id": 3, "type": "stat", "title": "Ready Nodes", "gridPos": {"x": 8, "y": 0, "w": 2, "h": 2}, "targets": [{"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}}}, {"id": 4, "type": "stat", "title": "Deployments", "gridPos": {"x": 10, "y": 0, "w": 2, "h": 2}, "targets": [{"expr": "count(kube_deployment_created)", "refId": "A"}