    {"title": "\ud83d\udd10 Supply Chain & Admission Enforcement", "uid": "supply-chain-enforcement", "tags": ["security", "supply-chain", "kyverno", "admission", "hybrid"], "refresh": "30s", "editable": true, "graphTooltip": 1, "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m", "30m"]}, "time": {"from": "now-24h", "to": "now"}, "panels": [{"id": 0, "type": "text", "title": "", "description": "", "gridPos": {"x": 0, "y": 0, "w": 24, "h": 1}, "options": {"content": "\u26a1 **Hybrid dashboard:** top row = universal (no Kyverno needed); bottom rows = Kyverno admission controller metrics. Kyverno panels show 0 if Kyverno is not deployed \u2014 deploy Kyverno to unlock full enforcement visibility.", "mode": "markdown"}}, {"id": 1, "type": "stat", "title": "\ud83d\ude80 Pod Creations (24h)", "description": "Total pods created in the cluster \u2014 every creation is a supply-chain event. Works with standard kube-state-metrics; no admission controller needed.", "gridPos": {"x": 0, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "sum(increase(kube_pod_created[24h])) or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "color": {"mode": "fixed", "fixedColor": "blue"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}}, {"id": 2, "type": "stat", "title": "\ud83d\uded1 Pod Failures (24h)", "description": "Pods that entered Failed phase \u2014 may be blocked by security context policies, image pull rejections, or resource constraints. Universal kube metric.", "gridPos": {"x": 4, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "sum(increase(kube_pod_status_phase{phase=\"Failed\"}[24h])) or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}}}}, {"id": 3, "type": "stat", "title": "\ud83d\udc33 Image Pulls (1h)", "description": "Container image pulls in the last hour. Spikes = new deployments; flat + high errors = registry or signature issues. Universal kube metric.", "gridPos": {"x": 8, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "sum(rate(container_network_receive_bytes_total[1h])) / 1024 / 1024 or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}}, {"id": 4, "type": "stat", "title": "\u26a0\ufe0f ImagePullBackOff", "description": "Pods stuck in ImagePullBackOff \u2014 often caused by missing images, registry auth failures, or unsigned images rejected by container runtime. Universal metric.", "gridPos": {"x": 12, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "count(kube_pod_status_reason{reason=\"ImagePullBackOff\"}) or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}, {"expr": "count(kube_pod_status_reason{reason=\"ErrImagePull\"}) or on() vector(0)", "refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}}}}, {"id": 5, "type": "stat", "title": "\ud83d\udd10 Admission Requests (24h) \u26a1", "description": "Every create/update the cluster asked Kyverno to judge. \u26a1 Requires Kyverno \u2014 shows 0 if not deployed.", "gridPos": {"x": 16, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "sum(increase(kyverno_admission_requests_total[24h])) or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}}}}, {"id": 6, "type": "stat", "title": "\ud83d\uded1 Blocked at Admission (24h) \u26a1", "description": "Requests rejected by enforce-mode policy. The platform doing its job. \u26a1 Requires Kyverno \u2014 shows 0 if not deployed.", "gridPos": {"x": 20, "y": 1, "w": 4, "h": 4}, "targets": [{"expr": "sum(increase(kyverno_policy_results_total{rule_result=~\"(?i)fail\", policy_validation_mode=~\"(?i)enforce\"}[24h])) or on() vector(0)", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "colorMode": "background"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 10}]}}}}, {"id": 10, "type": "timeseries", "title": "\ud83d\udcca Pod Creations vs Failures (universal)", "description": "Supply-chain outcomes visible without an admission controller: pod creation rate vs failure rate. A gap opening between the two lines = growing rejection rate at any layer.", "gridPos": {"x": 0, "y": 5, "w": 12, "h": 7}, "targets": [{"expr": "sum(rate(kube_pod_created[10m])) or on() vector(0)", "legendFormat": "Creations", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}, {"expr": "sum(rate(kube_pod_status_phase{phase=\"Failed\"}[10m])) or on() vector(0)", "legendFormat": "Failures", "refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "lineWidth": 2, "pointSize": 5, "showPoints": "always"}}}}, {"id": 11, "type": "timeseries", "title": "\ud83d\udee1\ufe0f Admission Results Over Time (pass/fail/warn) \u26a1", "description": "Every policy evaluation, bucketed by outcome. Spikes in 'fail' are rejected deploys. \u26a1 Requires Kyverno \u2014 shows flat 0 if not deployed.", "gridPos": {"x": 12, "y": 5, "w": 12, "h": 7}, "targets": [{"expr": "sum by (rule_result) (increase(kyverno_policy_results_total[10m])) or on() vector(0)", "legendFormat": "{{rule_result}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 20, "lineWidth": 2, "stacking": {"mode": "normal"}}}}}, {"id": 12, "type": "timeseries", "title": "\ud83d\udc33 Image Pull Errors by Namespace", "description": "Rate of ImagePullBackOff and ErrImagePull events. This is your supply-chain gate without needing Kyverno \u2014 if images can't be pulled, they can't run.", "gridPos": {"x": 0, "y": 12, "w": 12, "h": 7}, "targets": [{"expr": "sum by (namespace) (rate(kube_pod_status_reason{reason=\"ImagePullBackOff\"}[5m]) * 100) or on() vector(0)", "legendFormat": "BackOff: {{namespace}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}, {"expr": "sum by (namespace) (rate(kube_pod_status_reason{reason=\"ErrImagePull\"}[5m]) * 100) or on() vector(0)", "legendFormat": "ErrPull: {{namespace}}", "refId": "B", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 15, "lineWidth": 2, "pointSize": 5, "showPoints": "always"}}}}, {"id": 13, "type": "timeseries", "title": "\ud83d\udd11 Image Signature Verification (pass vs fail) \u26a1", "description": "imageVerify outcomes only: a 'fail' line is an unsigned image turned away. \u26a1 Requires Kyverno with cosign keyless verification \u2014 shows flat 0 if not deployed.", "gridPos": {"x": 12, "y": 12, "w": 12, "h": 7}, "targets": [{"expr": "sum by (rule_result) (increase(kyverno_policy_results_total{rule_type=~\"(?i)imageverify\"}[10m])) or on() vector(0)", "legendFormat": "{{rule_result}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 20, "lineWidth": 2, "pointSize": 6, "showPoints": "always"}}}}, {"id": 20, "type": "bargauge", "title": "\ud83d\udeab Blocks by Policy (24h) \u26a1", "description": "Which enforce-mode policies are rejecting the most \u2014 the platform's teeth, ranked. \u26a1 Requires Kyverno \u2014 shows empty if not deployed.", "gridPos": {"x": 0, "y": 19, "w": 8, "h": 8}, "targets": [{"expr": "topk(10, sum by (policy_name) (increase(kyverno_policy_results_total{rule_result=~\"(?i)fail\", policy_validation_mode=~\"(?i)enforce\"}[24h]))) or on() vector(0)", "legendFormat": "{{policy_name}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"orientation": "horizontal", "displayMode": "gradient"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}}}}, {"id": 21, "type": "piechart", "title": "\ud83d\udce6 Pod Status Distribution", "description": "What's running vs failing vs pending. Universal metric \u2014 no admission controller needed. Healthy clusters show 95%+ Running.", "gridPos": {"x": 8, "y": 19, "w": 8, "h": 8}, "targets": [{"expr": "sum by (phase) (kube_pod_status_phase)", "legendFormat": "{{phase}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"pieType": "donut", "legend": {"displayMode": "list", "placement": "right", "values": ["value"]}, "reduceOptions": {"calcs": ["lastNotNull"]}}, "fieldConfig": {"defaults": {"color": {"mode": "continuous-GrYlRd"}}}}, {"id": 22, "type": "bargauge", "title": "\ud83d\udc33 Images by Registry", "description": "Where your container images come from. ECR/GCR = internal/trusted; docker.io = public = higher supply-chain risk.", "gridPos": {"x": 16, "y": 19, "w": 8, "h": 8}, "targets": [{"expr": "count by (image) (kube_pod_container_info) or on() vector(0)", "legendFormat": "{{image}}", "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "options": {"orientation": "horizontal", "displayMode": "gradient"}, "fieldConfig": {"defaults": {"unit": "short", "decimals": 0, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}}, {"id": 30, "type": "table", "title": "\ud83d\udcdc Admission Enforcement Detail \u2014 denials & warnings \u26a1", "description": "Which rule rejected what kind of resource. Empty = nothing blocked (or Kyverno not deployed). \u26a1 Requires Kyverno \u2014 shows empty table if not deployed.", "gridPos": {"x": 0, "y": 27, "w": 12, "h": 8}, "targets": [{"expr": "sum by (policy_name, rule_name, rule_type, resource_kind, rule_result) (kyverno_policy_results_total{rule_result=~\"(?i)fail|(?i)warn\"}) or on() vector(0)", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "transformations": [{"id": "organize", "options": {"renameByName": {"policy_name": "Policy", "rule_name": "Rule", "rule_type": "Type", "resource_kind": "Resource Kind", "rule_result": "Result", "Value": "Count"}, "excludeByName": {"Time": true}}}], "fieldConfig": {"defaults": {"custom": {"align": "left"}}}}, {"id": 31, "type": "table", "title": "\u26a0\ufe0f Problematic Pods \u2014 Image Pull Issues", "description": "Pods that can't pull their images. This is your universal supply-chain failure table \u2014 works without any admission controller. Investigate: wrong tag, registry auth, missing signature.", "gridPos": {"x": 12, "y": 27, "w": 12, "h": 8}, "targets": [{"expr": "kube_pod_status_reason{reason=~\"ImagePullBackOff|ErrImagePull\"}", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}]}, {"id": 40, "type": "table", "title": "\ud83d\udce6 Image Inventory \u2014 All Running Containers", "description": "Full inventory of container images running in the cluster. Use this to audit: are images from trusted registries? Any stale tags (latest)? Any public images that should be internal?", "gridPos": {"x": 0, "y": 35, "w": 24, "h": 8}, "targets": [{"expr": "kube_pod_container_info", "format": "table", "instant": true, "refId": "A", "datasource": {"type": "prometheus", "uid": "prometheus"}}], "transformations": [{"id": "organize", "options": {"renameByName": {"namespace": "Namespace", "pod": "Pod", "container": "Container", "image": "Image", "image_id": "Image ID"}, "excludeByName": {"Time": true, "container_id": true, "node": true, "uid": true, "__name__": true, "job": true, "instance": true}}}], "fieldConfig": {"defaults": {"custom": {"align": "left"}}}}]}
