s": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 6, "type": "stat", "title": "\ud83c\udf10 Network Policies", "gridPos": {"x": 20, "y": 0, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_networkpolicy_created)", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 1}, {"color": "green", "value": 5}]}, "unit": "short", "decimals": 0}}}, {"id": 10, "type": "stat", "title": "\u26a0\ufe0f Non-Running Pods", "gridPos": {"x": 0, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase!=\"Running\"})", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 15}]}, "unit": "short", "decimals": 0}}}, {"id": 11, "type": "stat", "title": "\ud83d\udd04 Restarts (1h)", "gridPos": {"x": 4, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 3}, {"color": "red", "value": 10}]}, "unit": "short", "decimals": 0}}}, {"id": 12, "type": "stat", "title": "\ud83d\udce6 Policy Changes (1h)", "gridPos": {"x": 8, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "sum(increase(kyverno_policy_changes_total[1h]))", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 13, "type": "stat", "title": "\ud83d\udd01 Reconciles (1h)", "gridPos": {"x": 12, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "sum(increase(kyverno_controller_reconcile_total[1h]))", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short", "decimals": 0}}}, {"id": 14, "type": "stat", "title": "\ud83e\uddf9 Pending Pods", "gridPos": {"x": 16, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Pending\"})", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short", "decimals": 0}}}, {"id": 15, "type": "stat", "title": "\ud83d\udc80 Failed Pods", "gridPos": {"x": 20, "y": 3, "w": 4, "h": 3}, "targets": [{"expr": "count(kube_pod_status_phase{phase=\"Failed\"})", "legendFormat": "", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}, "unit": "short", "decimals": 0}}}, {"id": 20, "type": "bargauge", "title": "\ud83d\udcca Pods by Namespace", "gridPos": {"x": 0, "y": 6, "w": 8, "h": 6}, "targets": [{"expr": "count by (namespace) (kube_pod_info)", "legendFormat": "{{namespace}}", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}}}}, {"id": 21, "type": "bargauge", "title": "\ud83c\udff7\ufe0f Secrets by Type", "gridPos": {"x": 8, "y": 6, "w": 8, "h": 6}, "targets": [{"expr": "count by (type) (kube_secret_type)", "legendFormat": "{{type}}", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "purple", "value": null}]}}}}, {"id": 22, "type": "bargauge", "title": "\ud83d\udce6 Secrets by Namespace", "gridPos": {"x": 16, "y": 6, "w": 8, "h": 6}, "targets": [{"expr": "count by (namespace) (kube_secret_info)", "legendFormat": "{{namespace}}", "refId": "A"}], "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}}}}, {"id": 30, "type": "timeseries", "title": "\ud83d\udcc8 Policy Changes Over Time", "gridPos": {"x": 0, "y": 12, "w": 12, "h": 6}, "targets": [{"expr": "sum(rate(kyverno_policy_changes_total[5m]))", "legendFormat": "changes", "refId": "A"}, {"expr": "sum(rate(kyverno_controller_reconcile_total[5m]))", "legendFormat": "reconciles", "refId": "B"}], "fieldConfig": {"defaults": {"unit": "ops", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 31, "type": "timeseries", "title": "\ud83d\udd04 Pod Restarts by Namespace", "gridPos": {"x": 12, "y": 12, "w": 12, "h": 6}, "targets": [{"expr": "sum by (namespace) (rate(kube_pod_container_status_restarts_total[5m]))", "legendFormat": "{{namespace}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"fillOpacity": 10, "lineWidth": 2}}}}, {"id": 32, "type": "timeseries", "title": "\ud83d\udccb Pod Status by Phase", "gridPos": {"x": 0, "y": 18, "w": 12, "h": 6}, "targets": [{"expr": "count by (phase) (kube_pod_status_phase)", "legendFormat": "{{phase}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 15, "lineWidth": 2}}}}, {"id": 33, "type": "timeseries", "title": "\ud83c\udf10 Network Policies by Namespace", "gridPos": {"x": 12, "y": 18, "w": 12, "h": 6}, "targets": [{"expr": "count by (namespace) (kube_networkpolicy_created)", "legendFormat": "{{namespace}}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 15, "lineWidth": 2}}}}, {"id": 40, "type": "table", "title": "\ud83d\udcdc Active Policies & Rules", "gridPos": {"x": 0, "y": 24, "w": 12, "h": 6}, "targets": [{"expr": "kyverno_policy_rule_info_total", "format": "table", "instant": true, "refId": "A"}]}, {"id": 41, "type": "table", "title": "\u26a0\ufe0f Non-Running Pods Detail", "gridPos": {"x": 12, "y": 24, "w": 12, "h": 6}, "targets": [{"expr": "kube_pod_status_phase{phase!=\"Running\"}", "format": "table", "instant": true, "refId": "A"}]}]}
