alco (eBPF) | Watches kernel syscalls on every node \u2014 catches post-exploit behavior |\n| **Fan-out** | falcosidekick | Routes events to Loki (storage), Prometheus (metrics), and DeepSeek (AI RCA) |\n| **AI RCA** | DeepSeek Webhook | LLM root-cause analysis with containment command for Warning+ events |\n| **Visualization** | Grafana | This dashboard \u2014 real-time security posture |\n\n> **Pipeline**: Falco DaemonSet \u2192 falcosidekick \u2192 Loki (all events) + DeepSeek /falco (Warning+ RCA) \u2192 Grafana"}}]}
