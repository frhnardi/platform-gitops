# Argo Rollout — the progressive-delivery replacement for the plain Deployment.
# The pod template below is copied verbatim from the old deployment.yaml (same
# labels, hardened securityContext, resources, probes, volumes, container name
# and bare image name), so the Kyverno admission contract and the golden-path
# promotion still hold. The controller comes from apps/argo-rollouts.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sample-service
  labels:
    app.kubernetes.io/name: sample-service
    app.kubernetes.io/part-of: platform-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-service
  # Progressive delivery: shift traffic to the new ReplicaSet in weighted steps
  # with pauses between them, so a bad build is caught before it reaches 100%.
  # A first promotion holds at each pause until it is resumed (via GitOps or the
  # kubectl-argo-rollouts plugin: `kubectl argo rollouts promote sample-service`).
  #
  # This is a self-contained stepped canary — no metric analysis. To gate each
  # step automatically, an AnalysisTemplate querying the cluster's Prometheus
  # (apps/monitoring/) could be referenced here to auto-promote or abort on SLOs;
  # that is intentionally left out to keep the paved road simple.
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: { duration: 30s }
        - setWeight: 50
        - pause: { duration: 30s }
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-service
    spec:
      # Pod-level context satisfies require-run-as-nonroot for every container.
      # 65532 is the distroless "nonroot" UID/GID the service image runs as.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sample-service
          # Bare name on purpose: the kustomize images: transformer rewrites this
          # to the ACR path pinned by digest. The golden-path promotion PR sets
          # that digest — never a tag (disallow-latest-tag + provenance).
          image: sample-service
          ports:
            - name: http
              containerPort: 8080
          # Container context satisfies drop-all-capabilities,
          # require-readonly-rootfs, and disallow-privileged.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # require-resource-limits: both cpu and memory limits are mandatory.
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          # readOnlyRootFilesystem is true, so give the process a writable /tmp
          # via an ephemeral volume rather than a writable image layer.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
