apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Deploy into the app tier: baseline + supply-chain policies run in Enforce here.
namespace: apps

resources:
  - deployment.yaml
  - service.yaml

# The golden-path promotion PR rewrites this entry on every build: it sets
# `newName` + `digest` and deletes `newTag`, so the workload is only ever pinned
# by an immutable, signed digest. Until the first promotion merges, the tag
# below is a placeholder that resolves to no real image on purpose — the pod
# stays un-admitted (Kyverno can't verify an unsigned/absent image) rather than
# running something unproven.
images:
  - name: sample-service
    newName: prpacrdev.azurecr.io/sample-service
    newTag: bootstrap-unpromoted
