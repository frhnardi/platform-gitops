# Periodically fires a handful of policy-violating deploy *attempts* at the
# app-tier `apps` namespace so the Supply Chain & Admission Enforcement dashboard
# has real traffic to show (blocks by policy, admission requests, results over
# time). It uses `kubectl create --dry-run=server`: the request goes all the way
# through Kyverno's admission webhook (so metrics increment and the deny fires),
# but nothing is ever persisted — no pods to clean up, zero blast radius.
#
# This is a DEMO aid. Delete apps/demo-seeder.yaml (and this dir) to remove it;
# a real platform would not manufacture rejections on a timer.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-seeder
  namespace: demo-seeder
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: demo-seeder
        spec:
          serviceAccountName: demo-seeder
          restartPolicy: Never
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoSchedule
            - key: kubernetes.azure.com/scalesetpriority
              operator: Equal
              value: spot
              effect: NoSchedule
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: seeder
              # Alpine-based kubectl (has a shell, unlike distroless kubectl).
              # Pinned; swap the tag to match your cluster's kubectl minor.
              image: alpine/kubectl:1.31.3
              env:
                - name: HOME
                  value: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 20m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              command:
                - /bin/sh
                - -c
                - |
                  set -u
                  echo "demo-seeder: firing rogue deploy attempts at namespace 'apps' (server dry-run)"

                  # 1) privileged container -> disallow-privileged (baseline)
                  cat <<'EOF' | kubectl -n apps create --dry-run=server -f - 2>&1 | sed 's/^/  [privileged]  /' || true
                  apiVersion: v1
                  kind: Pod
                  metadata: {generateName: demo-privileged-}
                  spec:
                    containers:
                      - name: c
                        image: nginx:1.27-alpine
                        securityContext: {privileged: true}
                  EOF

                  # 2) mutable :latest tag -> disallow-latest-tag (baseline)
                  cat <<'EOF' | kubectl -n apps create --dry-run=server -f - 2>&1 | sed 's/^/  [latest-tag]  /' || true
                  apiVersion: v1
                  kind: Pod
                  metadata: {generateName: demo-latest-}
                  spec:
                    containers:
                      - name: c
                        image: nginx:latest
                  EOF

                  # 3) root + no resource limits -> require-run-as-nonroot + require-resource-limits
                  cat <<'EOF' | kubectl -n apps create --dry-run=server -f - 2>&1 | sed 's/^/  [root+nolimits]  /' || true
                  apiVersion: v1
                  kind: Pod
                  metadata: {generateName: demo-root-}
                  spec:
                    containers:
                      - name: c
                        image: busybox:1.36
                        command: ["sleep", "3600"]
                  EOF

                  # 4) baseline-compliant but UNSIGNED -> passes pod-security,
                  #    fails the supply-chain image-verify policies (the "unsigned
                  #    image rejected" story).
                  cat <<'EOF' | kubectl -n apps create --dry-run=server -f - 2>&1 | sed 's/^/  [unsigned]  /' || true
                  apiVersion: v1
                  kind: Pod
                  metadata: {generateName: demo-unsigned-}
                  spec:
                    securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
                    containers:
                      - name: c
                        image: nginx:1.27-alpine
                        securityContext:
                          allowPrivilegeEscalation: false
                          readOnlyRootFilesystem: true
                          capabilities: {drop: ["ALL"]}
                        resources:
                          requests: {cpu: 10m, memory: 16Mi}
                          limits: {cpu: 50m, memory: 32Mi}
                  EOF

                  echo "demo-seeder: done (all attempts are dry-run; nothing was created)"
          volumes:
            - name: tmp
              emptyDir: {}
