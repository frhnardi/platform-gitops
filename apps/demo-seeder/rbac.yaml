# Least privilege: the seeder may only *attempt to create* pods in the `apps`
# namespace (server-side dry-run needs the create verb). It never persists
# anything and cannot touch any other resource or namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-seeder
  namespace: demo-seeder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-seeder-attempt-pods
  namespace: apps
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-seeder-attempt-pods
  namespace: apps
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-seeder-attempt-pods
subjects:
  - kind: ServiceAccount
    name: demo-seeder
    namespace: demo-seeder
