apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: require-resource-limits
spec:
  namespaceTemplate:
    metadata:
      labels:
        paved-road.platform/tier: app
  steps:
    - name: install-policy
      try:
        - apply:
            file: ../require-resource-limits.yaml
        - script:
            content: kubectl wait --for=condition=Ready --timeout=90s clusterpolicy/require-resource-limits
        - sleep:
            duration: 3s
    - name: pod-with-limits-is-admitted
      try:
        - apply:
            file: good-pod.yaml
    - name: pod-without-limits-is-rejected
      try:
        - apply:
            file: bad-pod.yaml
            expect:
              - check:
                  ($error != null): true
