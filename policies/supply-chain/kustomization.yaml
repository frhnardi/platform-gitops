apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The keystone (ADR-0005): admit only golden-path-signed images, and require
# their SBOM attestation. The *_test/ folders next to these files are Chainsaw
# tests (they also carry throwaway stand-in policies pinned to a public test
# identity) and are intentionally NOT listed here.
resources:
  - verify-image-signature.yaml
  - verify-sbom-attestation.yaml
  - verify-provenance.yaml
